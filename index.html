<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Image Gallery</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
<h1>🌿 Nature Image Gallery</h1>
<p>Explore Beautiful Moments of Nature</p>
</header>

<div class="buttons">

<button class="active" onclick="filterSelection('all')">All</button>

<button onclick="filterSelection('mountain')">Mountains</button>

<button onclick="filterSelection('forest')">Forest</button>

<button onclick="filterSelection('water')">Water</button>

</div>


<div class="gallery">

<div class="image mountain">
<img src="https://picsum.photos/id/1018/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image forest">
<img src="https://picsum.photos/id/1015/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image water">
<img src="https://picsum.photos/id/1016/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image mountain">
<img src="https://picsum.photos/id/1020/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image forest">
<img src="https://picsum.photos/id/1024/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image water">
<img src="https://picsum.photos/id/1025/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image mountain">
<img src="https://picsum.photos/id/1036/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image forest">
<img src="https://picsum.photos/id/1039/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image water">
<img src="https://picsum.photos/id/1043/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image mountain">
<img src="https://picsum.photos/id/1056/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image forest">
<img src="https://picsum.photos/id/106/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image water">
<img src="https://picsum.photos/id/1074/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image mountain">
<img src="https://picsum.photos/id/1084/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image forest">
<img src="https://picsum.photos/id/1080/600/400" onclick="openLightbox(this.src)">
</div>

<div class="image water">
<img src="https://picsum.photos/id/1081/600/400" onclick="openLightbox(this.src)">
</div>

</div>


<div id="lightbox">

<span class="close" onclick="closeLightbox()">×</span>

<button class="prev" onclick="changeImage(-1)">❮</button>

<img id="lightbox-img">

<button class="next" onclick="changeImage(1)">❯</button>

</div>

<script src="script.js"></script>

</body>
</html>
